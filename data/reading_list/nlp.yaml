papers:
  - title: 'On-Policy Distillation of Language Models: Learning from Self-Generated Mistakes'
    author: Rishabh Agarwal, Nino Vieillard, Yongchao Zhou, Piotr Stanczyk, Sabela Ramos, Matthieu Geist, Olivier Bachem
    organization: Google
    date: '20230623'
    venue: ICLR 2024
    pdf_url: https://arxiv.org/pdf/2306.13649
    name: GKD
    category: 'Reinforcement Learning'
    summary: |
      It trains the student on its <b>own self-generated sequences</b> using token-level feedback from the teacher, fixing the train-inference mismatch.
      <ul>
          <li>It proposes <b>Generalized KD (GKD)</b> that uses a mixture of either ground-truth, teacher-generated, and student generated sequences.</li>
      </ul>
    highlight: true
  - title: On-Policy Distillation
    author: Thinking Machines
    organization: Thinking Machines
    date: '20251027'
    venue: Website 2025
    pdf_url: https://thinkingmachines.ai/blog/on-policy-distillation/
    name: OPD
    category: Reinforcement Learning
    summary:
      It grades every token of the <b>student's own rollouts</b> against a frozen teacher via reverse KL, achieving faster training.
    details:
      |2
      <ul>
          <li><b>On-policy learning (RL):</b> uses sparse feedback which is inefficient.</li>
          <li><b>Off-policy learning (distillation):</b> students may not follow the teacher well.</li>
          <li><b>OPD (On-Policy Distillation):</b> provide feedback at each student step.</li>
          <li><b>Advantages of OPD:</b> 
            <ul>
                <li>Training fast: shorter rollout; self-rollout; dense signals; smaller batchsize.
                <li>Generalizable: distribution learning; unhackable; anti-forgetting.
            </ul>
          </li>
      </ul>

  - title: Large Language Diffusion Models
    author: Shen Nie, Fengqi Zhu, Zebin You, Xiaolu Zhang, Jingyang Ou, Jun Hu, Jun Zhou, Yankai Lin, Ji-Rong Wen, Chongxuan Li
    organization: Renmin University of China, Ant Group
    date: '20250214'
    venue: arXiv 2025
    pdf_url: https://arxiv.org/pdf/2502.09992
    code_url: https://github.com/ML-GSAI/LLaDA
    name: LLaDA
    category: Foundation Algorithms & Models
    summary: |2

      It introduces a <b>masked diffusion language model</b> (8B) that matches strong autoregressive LLMs while inherently enabling bidirectional reasoning.
    details: |2

      <ul>
          <li> It argues that <b>generative modeling</b> is to learn \(\max_{\theta}\mathbb{E}_{p_{data}(x)}\log p_{\theta}(x)\), which <b>need not be auto-regressive</b>.</li>
          <li><b>Instruction-following</b> and <b>in-context learning</b> are also not exclusive advantages of autoregressive models.</li>
          <li>Auto-regressive models have disadvantages such as <b>high computational costs</b> due to <b>token-by-token generation</b>, and limitations in <b>reversal reasoning</b> due to <b>left-to-right generation</b>.</li>
          <li><b>LLaDA (8B) with 4096 tokens</b> is pre-trained from scratch on 2.3T tokens using 0.13M H800 GPU hours, followed by SFT on 4.5M pairs.</li>
          <li>LLaDA <b>does not use a causal mask</b>, as it sees the entire context.</li>
          <li>LLaDA uses <b>vanilla multi-head attention</b>, as it is incompatible with KV cache.</li>
      </ul>
      fig: fig1.png 900
      cap: <b>Pre-training.</b> Tokens are independently randomly masked by probability of \(t\sim U[0,1]\), the model predicts the masked tokens by minimizing the cross-entropy loss. <b>SFT.</b> Only response tokens are possibly masked. <b>Inference.</b> Stimulate a diffusion process from \(t=1\) to \(t=0\).
    highlight: true
  - title: 'Direct Preference Optimization: Your Language Model is Secretly a Reward Model'
    author: Rafael Rafailov, Archit Sharma, Eric Mitchell, Stefano Ermon, Christopher D. Manning, Chelsea Finn
    organization: Stanford University, CZ Biohub
    date: '20230529'
    venue: NeurIPS 2023
    pdf_url: https://arxiv.org/pdf/2305.18290
    name: DPO
    comment: It offers a simple, RL-free recipe to turn human preference data into aligned language models with equal or better performance than RLHF while eliminating reward-model training and heavy hyper-parameter tuning overhead. It has over 5,000 citations (as of Sep 2025).
    category: Reinforcement Learning
    summary: |2

      It introduces DPO, a <b>single-stage, RL-free</b> algorithm that directly optimizes a language model on preference data by reparameterizing the Bradley-Terry objective into a simple classification loss.
    details: |2+

    highlight: true
