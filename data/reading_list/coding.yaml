  - title: Git
    date: '20260514'
    venue: git tools
    name: git
    category: Tools
    summary: Git is a <b>distributed version control system</b> that allows you to track changes in your code and collaborate with others.
    details: |2

      <table class="center">
      <tr>
      <th>category</th>
      <th>tool (alphabetical)</th>
      </tr>
      <tr>
      <td>Setup and configure</td>
      <td>
      <a href="#git-config">config</a> &nbsp;&nbsp;
      <a href="#ssh keys">ssh keys</a> &nbsp;&nbsp;</td>
      </tr>
      <tr>
      <td>Get and create projects</td>
      <td>
      <a href="#git-clone">clone</a> &nbsp;&nbsp;
      </tr>
      <tr>
      <td>Branching and workspace</td>
      <td>
      <a href="#git-worktree">worktree</a> &nbsp;&nbsp;
      </td>
      </tr>
      </table>

      <p class="larger" id="git-clone">
      <b><a href="https://git-scm.com/docs/git-clone">clone</a>: </b>
      clone a repository into a new directory.

      <pre>
      <code class="language-bash" style="font-size: 14px;">
      git clone git@github.com:[user name]/[repo name].git
      </code>
      </pre>

      <p class="larger" id="git-config">
      <b><a href="https://git-scm.com/docs/git-config">config</a>: </b>
      get and set repository or global options.

      <pre>
      <code class="language-bash" style="font-size: 14px;">
      git config --list  # list all config
      git config user.name [your name] && git config user.email [your email]  # repo config; cd to repo and execute
      git config --global user.name [your name] && git config --global user.email [your email]  # global config
      </code>
      </pre>

      <p class="larger" id="ssh keys">
      <b><a href="https://docs.github.com/en/authentication/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent">ssh keys</a>: </b>
      generate a new SSH key to use for authentication.
      <pre>
      <code class="language-bash" style="font-size: 14px;">
      ## 1. Check if SSH key exists: *.pub
      ls -al ~/.ssh
      ## 2. If not, generate a new SSH key
      ssh-keygen -t rsa -b 4096 -C [your GitHub email]
      ## 3. Copy SSH key
      cat ~/.ssh/[your key name].pub
      ## 4. Open GitHub -> Settings -> SSH and GPG keys -> New SSH key -> paste the SSH key
      ## 5. Test
      ssh -T git@github.com  # to see if it prints "Hi *! You've successfully ..."
      </code>
      </pre>

      <p class="larger" id="git-worktree">
      <b><a href="https://git-scm.com/docs/git-worktree">worktree</a>: </b>
      check out <b>multiple branches into separate directories</b> from the same repo. All worktrees share the same <code>.git</code> object store, so adding one costs almost no disk space and avoids the <code>stash</code> + <code>checkout</code> dance when switching branches.
      <pre>
      <code class="language-bash" style="font-size: 14px;">
      ## Typical uses: 
      ## 1. Handle a hotfix without disturbing in-progress work
      ## 2. Run builds/tests on multiple branches in parallel
      ## 3. Review a PR branch alongside your own
      ## 4. Let an AI agent edit code in an isolated workspace
      ## Note: 
      ## 1. A branch can only be checked out in one worktree at a time
      ## 2. The main repo directory itself is a worktree
      ## 3. Deleting a worktree folder with `rm -rf` leaves dangling metadata that `git worktree prune` must clean up

      ## Add a worktree for a branch
      git worktree add [worktree path] [remote/local branch name]

      ## Remove a worktree
      git worktree remove [worktree path]
      ## Clean up records of worktrees whose directories were deleted
      git worktree prune

      ## List all worktrees
      git worktree list
      </code>
      </pre>
